name: Bug Report
description: Report a bug with Chee
labels: [bug]
body:
  - type: dropdown
    id: site
    attributes:
      label: Site
      options:
        - chess.com
        - lichess.org
        - Both
    validations:
      required: true

  - type: dropdown
    id: page
    attributes:
      label: Page type
      options:
        - Live game
        - Game review
        - Puzzle (rated)
        - Puzzle Rush
        - Puzzle Battle
        - Puzzle Learning
        - Daily chess
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: e.g. 1.6.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: e.g. Chrome 131

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Open DevTools (F12), enable debug (`localStorage.debug = 'chee:*'`), reproduce the bug, and paste any errors.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
