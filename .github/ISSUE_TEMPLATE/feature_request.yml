name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this solve? What's missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe how you'd like it to work
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analysis panel
        - Move classification
        - Arrows / hints
        - Puzzle mode
        - Trapboy
        - PGN export
        - Popup / settings
        - Multi-site support
        - Other
    validations:
      required: true
